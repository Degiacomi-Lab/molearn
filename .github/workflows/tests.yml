name: Tests

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up conda + mamba
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: molearn
          environment-file: .github/test_environment.yml
          mamba-version: "*"
          conda-solver: libmamba
          channels: conda-forge,salilab,defaults
          channel-priority: strict
          auto-update-conda: false
          remove-profiles: true
          run-post: true

      # Optional but VERY useful for debugging environment issues
      - name: Debug environment
        run: |
          conda info
          conda list
          conda run -n molearn python -c "import sys; print(sys.executable)"
          conda run -n molearn python -c "import pkg_resources; print('pkg_resources OK')"

      - name: Run tests
        run: |
          conda run -n molearn python test/test_openmm_plugin.py
          conda run -n molearn python test/test_pdbdata.py
          conda run -n molearn python test/test_trainer.py
